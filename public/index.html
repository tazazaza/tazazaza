<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>my_board_game Chat</title>
</head>
<body>
  <h2>my_board_game チャットテスト</h2>
  <div id="messages" style="border:1px solid #ccc; height:200px; overflow:auto;"></div>
  <input id="msg" type="text" placeholder="メッセージ入力"/>
  <button onclick="sendMsg()">送信</button>

  <script>
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onmessage = (event) => {
      const div = document.getElementById('messages');
      div.innerHTML += `<div>${event.data}</div>`;
      div.scrollTop = div.scrollHeight;
    };

    function sendMsg() {
      const input = document.getElementById('msg');
      if (input.value) {
        ws.send(input.value);
        input.value = '';
      }
    }
  </script>
</body>
</html>
