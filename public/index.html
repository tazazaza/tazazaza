<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIKUO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- モード選択画面 -->
    <div id="modeSelect" class="screen">
        <div class="logo-container">
            <h1 class="logo">PIKUO</h1>
        </div>
        <div class="mode-buttons">
            <button class="mode-btn" id="onlineMode">ONLINE</button>
        </div>
    </div>

    <!-- オンライン待機画面 -->
    <div id="waitingRoom" class="screen hidden">
        <div class="room-header">
            <h2 class="logo-small">PIKUO</h2>
            <button class="back-btn" id="backToMode">← BACK</button>
        </div>
        
        <div class="player-seats">
            <div class="seat" id="seat1">
                <div class="seat-label">PLAYER 1</div>
                <button class="seat-btn" id="sitBtn1">SIT</button>
                <div class="seated-indicator hidden">SEATED</div>
            </div>
            <div class="seat" id="seat2">
                <div class="seat-label">PLAYER 2</div>
                <button class="seat-btn" id="sitBtn2">SIT</button>
                <div class="seated-indicator hidden">SEATED</div>
            </div>
        </div>

        <div class="cost-control">
            <label for="costSlider">COST LIMIT: <span id="costValue">30</span></label>
            <input type="range" id="costSlider" min="20" max="50" value="30">
        </div>

        <div class="spectator-area">
            <div class="spectator-label">SPECTATING</div>
            <div id="spectatorBoard" class="board-preview"></div>
        </div>
    </div>

    <!-- セットアップ画面 -->
    <div id="setupScreen" class="screen hidden">
        <button class="help-btn" id="setupHelpBtn">?</button>
        <button class="volume-btn" id="setupVolumeBtn">🔊</button>
        <div class="setup-header">
            <h2 class="logo-small">PIKUO</h2>
            <div class="status-text">CONFIGURE YOUR PIECES</div>
            <div class="cost-display">REMAINING: <span id="remainingCost">30</span></div>
        </div>

        <div class="setup-container">
            <div class="board-container">
                <canvas id="setupCanvas" width="800" height="800"></canvas>
            </div>

            <div class="piece-palette">
                <div class="palette-title">PIECES</div>
                <div class="piece-list" id="pieceList"></div>
                <div class="setup-controls">
                    <button class="control-btn small" id="undoBtn">← UNDO</button>
                    <button class="control-btn small" id="redoBtn">REDO →</button>
                    <button class="control-btn small" id="resetBtn">RESET</button>
                </div>
                <div class="ready-status">
                    <div class="ready-indicator" id="myReadyStatus">
                        <span class="ready-label">YOU:</span>
                        <span class="ready-state">NOT READY</span>
                    </div>
                    <div class="ready-indicator" id="oppReadyStatus">
                        <span class="ready-label">OPPONENT:</span>
                        <span class="ready-state">NOT READY</span>
                    </div>
                </div>
                <button class="ready-btn" id="readyBtn">READY</button>
                <button class="leave-btn" id="leaveSetup">LEAVE</button>
            </div>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen hidden">
        <button class="help-btn" id="gameHelpBtn">?</button>
        <button class="volume-btn" id="gameVolumeBtn">🔊</button>
        <div class="game-header">
            <h2 class="logo-small">PIKUO</h2>
            <div class="turn-indicator"><span id="currentPlayer">YOUR TURN</span></div>
        </div>

        <div class="game-container">
            <div class="captured-area opponent-captured">
                <div class="captured-label">OPPONENT'S CAPTURED</div>
                <div class="captured-pieces" id="opponentCaptured"></div>
            </div>

            <div class="board-container">
                <canvas id="gameCanvas" width="800" height="800"></canvas>
            </div>

            <div class="captured-area player-captured">
                <div class="captured-label">YOUR CAPTURED</div>
                <div class="captured-pieces" id="playerCaptured"></div>
            </div>
        </div>

        <div class="game-controls">
            <button class="control-btn" id="surrenderBtn">SURRENDER</button>
            <button class="control-btn" id="leaveGame">LEAVE</button>
        </div>
    </div>

    <!-- 勝敗画面 -->
    <div id="resultScreen" class="screen hidden">
        <div class="result-container">
            <h1 class="result-text" id="resultText">PLAYER 1 WINS</h1>
            <button class="mode-btn" id="nextGame">NEXT GAME</button>
        </div>
    </div>

    <!-- ヘルプモーダル -->
    <div id="helpModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="closeHelp">&times;</span>
            <h2>PIECE MOVEMENTS</h2>
            <div id="helpContent" class="help-grid"></div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="game.js"></script>
    <script src="help.js"></script>
    <script src="online.js"></script>
</body>
</html>
